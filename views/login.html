<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - InterSync</title>
    <meta name="description" content="Login to InterSync - Peer-to-peer mock interview platform">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background orbs */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }
        body::before {
            width: 400px; height: 400px;
            background: #6c63ff;
            top: -100px; left: -100px;
        }
        body::after {
            width: 350px; height: 350px;
            background: #00d4aa;
            bottom: -100px; right: -100px;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        .container {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 420px;
            padding: 40px 35px;
            border-radius: 20px;
            border: 1px solid rgba(108, 99, 255, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6c63ff, #00d4aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 30px;
        }

        h2 {
            color: #e0e0e0;
            margin-bottom: 25px;
            font-weight: 600;
            font-size: 22px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 6px;
            font-weight: 500;
            color: #b0b0cc;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(108, 99, 255, 0.2);
            background: rgba(15, 15, 26, 0.6);
            color: #e0e0e0;
            margin-bottom: 18px;
            outline: none;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
        }

        input::placeholder {
            color: #555577;
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #6c63ff, #5a52e0);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.3px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .links {
            margin-top: 20px;
            font-size: 13px;
        }

        .links a {
            color: #00d4aa;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .links a:hover {
            color: #00f0c0;
            text-decoration: underline;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
        }

        @media (max-width: 480px) {
            .container { margin: 20px; padding: 30px 25px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">⚡ InterSync</div>
    <p class="subtitle">Peer-to-Peer Mock Interviews</p>

    <h2>Welcome Back</h2>

    <p id="errorMsg" class="error-msg"></p>

    <form id="loginForm">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>

        <button id="loginBtn" type="submit">Sign In</button>
    </form>

    <div class="links">
        <a href="./signup.html">Don't have an account? Sign Up</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="../script/login.js"></script>

</body>
</html>
