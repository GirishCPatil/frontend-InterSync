<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question Bank - InterSync Premium</title>
    <meta name="description" content="Premium Technical Question Bank">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 30px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(108, 99, 255, 0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #6c63ff, #00d4aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .nav-btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ── Main Layout ── */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 10px;
            color: #ff9800;
            text-shadow: 0 4px 20px rgba(255, 152, 0, 0.2);
        }

        .page-header p {
            color: #8888aa;
            font-size: 15px;
        }

        /* ── Filters ── */
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(108, 99, 255, 0.1);
            color: #b0b0ff;
            border: 1px solid rgba(108, 99, 255, 0.2);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.2s;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: #6c63ff;
            color: white;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
            border-color: #6c63ff;
        }

        /* ── Question List ── */
        .q-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .q-card {
            background: linear-gradient(145deg, rgba(26, 26, 46, 0.8), rgba(15, 15, 26, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .q-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border-color: rgba(108, 99, 255, 0.3);
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .q-title {
            font-size: 18px;
            font-weight: 600;
            color: #e0e0e0;
            line-height: 1.4;
        }

        .q-tags {
            display: flex;
            gap: 8px;
        }

        .q-tag {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .tag-category {
            background: rgba(108, 99, 255, 0.15);
            color: #b0b0ff;
        }

        .tag-difficulty.easy {
            color: #00d4aa;
            background: rgba(0, 212, 170, 0.15);
        }

        .tag-difficulty.medium {
            color: #ff9800;
            background: rgba(255, 152, 0, 0.15);
        }

        .tag-difficulty.hard {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.15);
        }

        .q-hint-toggle {
            background: none;
            border: none;
            color: #00d4aa;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 15px;
            font-family: inherit;
        }

        .q-hint-toggle:hover {
            text-decoration: underline;
        }

        .q-hint {
            display: none;
            margin-top: 10px;
            padding: 15px;
            background: rgba(0, 212, 170, 0.05);
            border-left: 3px solid #00d4aa;
            border-radius: 4px 8px 8px 4px;
            font-size: 14px;
            color: #b0b0cc;
            line-height: 1.5;
        }

        .q-hint.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <a href="./dashboard.html" class="nav-logo">⚡ InterSync</a>
        <a href="./dashboard.html" class="nav-btn">← Back to Dashboard</a>
    </nav>

    <!-- Main Content -->
    <div class="container">

        <div class="page-header">
            <h1>Premium Question Bank</h1>
            <p>Master these frequently asked technical and behavioral questions curated by industry experts.</p>
        </div>

        <div class="filters" id="filterContainer">
            <button class="filter-btn active" data-filter="All">All</button>
            <button class="filter-btn" data-filter="JavaScript">JavaScript</button>
            <button class="filter-btn" data-filter="MongoDB">MongoDB</button>
            <button class="filter-btn" data-filter="React">React</button>
            <button class="filter-btn" data-filter="System Design">System Design</button>
            <button class="filter-btn" data-filter="Behavioral">Behavioral</button>
        </div>

        <div class="q-list" id="questionList">
            <!-- Populated by JS -->
        </div>

    </div>

    <script src="../script/questions.js"></script>

</body>

</html>
