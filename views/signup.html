<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - InterSync</title>
    <meta name="description" content="Create your InterSync account for peer-to-peer mock interviews">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            padding: 20px 0;
        }

        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: #6c63ff;
            top: -100px;
            right: -100px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: #00d4aa;
            bottom: -100px;
            left: -100px;
            animation-delay: 4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -30px) scale(1.1);
            }
        }

        .container {
            background: rgba(26, 26, 46, 0.9);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 460px;
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(108, 99, 255, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6c63ff, #00d4aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #8888aa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        h2 {
            color: #e0e0e0;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 22px;
        }

        label {
            display: block;
            text-align: left;
            margin-bottom: 5px;
            font-weight: 500;
            color: #b0b0cc;
            font-size: 13px;
        }

        input,
        select {
            width: 100%;
            padding: 11px 14px;
            border-radius: 10px;
            border: 1px solid rgba(108, 99, 255, 0.2);
            background: rgba(15, 15, 26, 0.6);
            color: #e0e0e0;
            margin-bottom: 14px;
            outline: none;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus,
        select:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.15);
        }

        input::placeholder {
            color: #555577;
        }

        select {
            cursor: pointer;
        }

        select option {
            background: #1a1a2e;
            color: #e0e0e0;
        }

        .multi-select-info {
            text-align: left;
            font-size: 11px;
            color: #666688;
            margin-top: -10px;
            margin-bottom: 14px;
        }

        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
            min-height: 30px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(108, 99, 255, 0.2);
            border: 1px solid rgba(108, 99, 255, 0.3);
            color: #b0b0ff;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }

        .chip .remove {
            cursor: pointer;
            color: #ff6b6b;
            font-weight: bold;
            font-size: 14px;
            line-height: 1;
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #6c63ff, #5a52e0);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.4);
        }

        .links {
            margin-top: 18px;
            font-size: 13px;
        }

        .links a {
            color: #00d4aa;
            text-decoration: none;
            font-weight: 500;
        }

        .links a:hover {
            color: #00f0c0;
            text-decoration: underline;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }

        @media (max-width: 480px) {
            .container {
                margin: 15px;
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">⚡ InterSync</div>
        <p class="subtitle">Peer-to-Peer Mock Interviews</p>

        <h2>Create Account</h2>

        <p id="errorMsg" class="error-msg"></p>

        <form id="signupForm">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Min 6 characters" required minlength="6">

            <label for="skillSelect">Select Your Skills</label>
            <select id="skillSelect">
                <option value="">-- Choose a skill --</option>
                <option value="JavaScript">JavaScript</option>
                <option value="Python">Python</option>
                <option value="Java">Java</option>
                <option value="C++">C++</option>
                <option value="React">React</option>
                <option value="Node.js">Node.js</option>
                <option value="TypeScript">TypeScript</option>
                <option value="MongoDB">MongoDB</option>
                <option value="SQL">SQL</option>
                <option value="Docker">Docker</option>
                <option value="AWS">AWS</option>
                <option value="Data Structures">Data Structures</option>
                <option value="Algorithms">Algorithms</option>
                <option value="System Design">System Design</option>
                <option value="REST API">REST API</option>
            </select>
            <p class="multi-select-info">Select skills one by one from the dropdown</p>
            <div id="skillChips" class="chips-container"></div>

            <label for="companySelect">Target Companies</label>
            <select id="companySelect">
                <option value="">-- Choose a company --</option>
                <option value="Google">Google</option>
                <option value="Amazon">Amazon</option>
                <option value="Microsoft">Microsoft</option>
                <option value="Meta">Meta</option>
                <option value="Apple">Apple</option>
                <option value="Netflix">Netflix</option>
                <option value="Flipkart">Flipkart</option>
                <option value="Uber">Uber</option>
                <option value="Adobe">Adobe</option>
                <option value="Infosys">Infosys</option>
                <option value="TCS">TCS</option>
                <option value="Wipro">Wipro</option>
            </select>
            <p class="multi-select-info">Select target companies one by one from the dropdown</p>
            <div id="companyChips" class="chips-container"></div>

            <button type="submit">Create Account</button>
        </form>

        <div class="links">
            <a href="./login.html">Already have an account? Sign In</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../script/signup.js"></script>

</body>

</html>
